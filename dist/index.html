<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Hub</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <nav>
        <h1>MovieApp</h1>
        <input type="text" placeholder="Search Movie">
    </nav>
    <div class="hero">
        <img src="https://placehold.co/1280x500" alt="Featured Movie">
        <div class="hero-info">
            <h2>Featured Movie Title</h2>
            <p>A short description of the movie go here.</p>
            <button>watch now</button>
        </div>
    </div>
    <div class="movie-grid">
        <div class="movie-card">
            <img src="https://placehold.co/200x300" alt="Movie Poster">
            <h3>Movie Title</h3>
            <p>rating: 8.5</p>
        </div>
        <div class="movie-card">
            <img src="https://placehold.co/200x300" alt="Movie Poster">
            <h3>Movie Title</h3>
            <p>rating: 9</p>
        </div>
        <div class="movie-card">
            <img src="https://placehold.co/200x300" alt="Movie Poster">
            <h3>Movie Title</h3>
            <p>rating: 7</p>
        </div>
    </div>
    <footer>
    <p>&copy; 2026 MovieApp. All rights reserved.</p>
    <p>Powered by TMDB</p>
</footer>
    <script src="../js/main.js"></script>
</body>
</html>
