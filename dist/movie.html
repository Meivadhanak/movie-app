<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Last updated: 2026-07-20 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Detail</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <nav>
        <div class="nav-left">
            <button class="menu-btn">☰</button>
            <h1>MovieApp</h1>
        </div>
        <div class="nav-center">
            <input type="text" placeholder="Search Movie">
        </div>
        <div class="nav-right">
            <a class="watchlist-link" href="watchlist.html">Watchlist</a>
        </div>
    </nav>
    <a class="back-btn" href="index.html">← Back</a>
    <div class="movie-detail">
        <div class="movie-backdrop">
            <img src="https://placehold.co/1280x500" alt="Movie Backdrop">
        </div>
        <div class="movie-detail-content">
            <div class="movie-poster">
                <img src="https://placehold.co/300x450" alt="Movie Poster">
            </div>
            <div class="movie-info">
                <h2>Movie Title</h2>
                <p class="tagline">The tagline goes here</p>
                <div class="meta">
                    <span class="rating">⭐ 8.5</span>
                    <span class="year">2024</span>
                    <span class="runtime">2h 15m</span>
                </div>
                <p class="overview">A longer description of the movie goes here. This gives the user an idea of what the movie is about before they decide to watch it.</p>
                <div class="genres">
                    <span>Action</span>
                    <span>Drama</span>
                    <span>Thriller</span>
                </div>
                <button class="watchlist-btn" id="watchlist-toggle-btn">+ Add to Watchlist</button>
            </div>
        </div>
    </div>
    <footer>
    <p>&copy; 2026 MovieApp. All rights reserved.</p>
    <p>Powered by TMDB</p>
</footer>
    <script src="../js/main.js"></script>
</body>
</html>
